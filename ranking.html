<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 Ranking — Feira Botânica</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(160deg, #0d1b2a 0%, #1b2838 50%, #0d2818 100%);
  min-height: 100vh;
  color: #fff;
  overflow-x: hidden;
}

/* ── HEADER ── */
.header {
  text-align: center;
  padding: 32px 20px 16px;
  position: relative;
}
.header-titulo {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(2rem, 5vw, 3.5rem);
  background: linear-gradient(135deg, #FFD60A, #FF6B2B, #52B788);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 2px;
  text-shadow: none;
}
.header-sub {
  font-size: 1rem;
  color: #52B788;
  margin-top: 4px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* ── STATUS ── */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin: 8px 0 20px;
  font-size: 0.9rem;
  color: #aaa;
}
.status-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #52B788;
  animation: pulse 1.5s infinite;
}
.status-dot.off { background: #E63946; animation: none; }
@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.5; transform: scale(1.3); }
}

/* ── GRID PRINCIPAL ── */
.main-grid {
  display: grid;
  grid-template-columns: 1fr 1.5fr;
  gap: 24px;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 40px;
}
@media (max-width: 768px) {
  .main-grid { grid-template-columns: 1fr; }
}

/* ── CARD BASE ── */
.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 24px;
  backdrop-filter: blur(10px);
}
.card-titulo {
  font-family: 'Fredoka One', cursive;
  font-size: 1.4rem;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

/* ── PÓDIO ── */
.podio-wrap {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 16px;
  padding: 20px 10px 10px;
}
.podio-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  transition: transform 0.3s;
}
.podio-item:hover { transform: translateY(-4px); }
.podio-avatar {
  width: 64px; height: 64px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Fredoka One', cursive;
  font-size: 1.6rem;
  color: #fff;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  border: 3px solid rgba(255,255,255,0.2);
}
.podio-avatar.ouro   { background: linear-gradient(135deg, #FFD700, #FFA500); width: 80px; height: 80px; font-size: 2rem; }
.podio-avatar.prata  { background: linear-gradient(135deg, #C0C0C0, #909090); }
.podio-avatar.bronze { background: linear-gradient(135deg, #CD7F32, #8B4513); }
.podio-avatar.vazio  { background: rgba(255,255,255,0.1); opacity: 0.4; }
.podio-nome {
  font-size: 0.85rem;
  font-weight: 800;
  text-align: center;
  max-width: 90px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.podio-pts {
  font-size: 0.8rem;
  color: #FFD60A;
  font-weight: 700;
}
.podio-base {
  width: 100%;
  text-align: center;
  font-size: 1.6rem;
  padding: 6px 0;
  border-radius: 8px 8px 0 0;
  background: rgba(255,255,255,0.08);
}
.podio-base.ouro   { background: rgba(255,215,0,0.2); }
.podio-base.prata  { background: rgba(192,192,192,0.2); }
.podio-base.bronze { background: rgba(205,127,50,0.2); }

/* ── STATS ── */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 12px;
}
.stat-box {
  background: rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 14px;
  text-align: center;
}
.stat-valor {
  font-family: 'Fredoka One', cursive;
  font-size: 2rem;
  color: #FFD60A;
  line-height: 1;
}
.stat-label {
  font-size: 0.75rem;
  color: #aaa;
  margin-top: 4px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ── RANKING LISTA ── */
.rank-lista {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 520px;
  overflow-y: auto;
  padding-right: 4px;
}
.rank-lista::-webkit-scrollbar { width: 4px; }
.rank-lista::-webkit-scrollbar-track { background: transparent; }
.rank-lista::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

.rank-row {
  display: grid;
  grid-template-columns: 44px 1fr auto auto;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px;
  padding: 12px 16px;
  transition: all 0.3s;
  animation: entrar 0.4s ease both;
}
.rank-row:hover { background: rgba(255,255,255,0.1); transform: translateX(4px); }
.rank-row.novo  { border-color: #52B788; background: rgba(82,183,136,0.1); }

@keyframes entrar {
  from { opacity: 0; transform: translateX(-20px); }
  to   { opacity: 1; transform: translateX(0); }
}

.rank-pos {
  font-family: 'Fredoka One', cursive;
  font-size: 1.3rem;
  text-align: center;
  color: #aaa;
}
.rank-pos.top1 { color: #FFD700; font-size: 1.6rem; }
.rank-pos.top2 { color: #C0C0C0; font-size: 1.4rem; }
.rank-pos.top3 { color: #CD7F32; font-size: 1.4rem; }

.rank-nome {
  font-weight: 800;
  font-size: 1rem;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.rank-acertos {
  font-size: 0.8rem;
  color: #52B788;
  font-weight: 700;
  white-space: nowrap;
}
.rank-pts {
  font-family: 'Fredoka One', cursive;
  font-size: 1.1rem;
  color: #FFD60A;
  white-space: nowrap;
}

.rank-vazio {
  text-align: center;
  padding: 40px;
  color: #555;
  font-size: 1rem;
  font-weight: 700;
}

/* ── NOVO JOGADOR TOAST ── */
.toast {
  position: fixed;
  bottom: 30px;
  right: 30px;
  background: linear-gradient(135deg, #2D6A4F, #52B788);
  color: #fff;
  padding: 14px 22px;
  border-radius: 14px;
  font-weight: 800;
  font-size: 0.95rem;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  animation: toastIn 0.4s ease, toastOut 0.4s ease 3.6s both;
  z-index: 999;
  max-width: 300px;
}
@keyframes toastIn  { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
@keyframes toastOut { from { opacity:1; } to { opacity:0; } }

/* ── BOTÃO LIMPAR ── */
.btn-limpar {
  background: rgba(230,57,70,0.15);
  border: 1px solid rgba(230,57,70,0.3);
  color: #E63946;
  padding: 8px 16px;
  border-radius: 10px;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
  margin-left: auto;
  display: block;
  margin-top: 12px;
}
.btn-limpar:hover { background: rgba(230,57,70,0.3); }

/* ── ÚLTIMA ATUALIZAÇÃO ── */
.ultima-atualizacao {
  text-align: center;
  color: #444;
  font-size: 0.8rem;
  margin-top: 8px;
}

/* ── DECORAÇÃO ── */
.folhas-bg {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}
.folha-bg {
  position: absolute;
  font-size: 3rem;
  opacity: 0.03;
  animation: floatFolha linear infinite;
}
@keyframes floatFolha {
  from { transform: translateY(110vh) rotate(0deg); }
  to   { transform: translateY(-10vh) rotate(360deg); }
}
.main-content { position: relative; z-index: 1; }
</style>
</head>
<body>

<div class="folhas-bg" id="folhas-bg"></div>

<div class="main-content">
  <div class="header">
    <div class="header-titulo">🌿 FEIRA BOTÂNICA</div>
    <div class="header-sub">Hall da Fama — Ranking ao Vivo</div>
    <div class="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-txt">Conectando...</span>
    </div>
  </div>

  <div class="main-grid">

    <!-- COL ESQUERDA: Pódio + Stats -->
    <div style="display:flex; flex-direction:column; gap:20px;">

      <div class="card">
        <div class="card-titulo">🏆 Pódio</div>
        <div class="podio-wrap" id="podio"></div>
      </div>

      <div class="card">
        <div class="card-titulo">📊 Estatísticas</div>
        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-valor" id="stat-jogadores">0</div>
            <div class="stat-label">Jogadores</div>
          </div>
          <div class="stat-box">
            <div class="stat-valor" id="stat-recorde">0</div>
            <div class="stat-label">Recorde 🍃</div>
          </div>
          <div class="stat-box">
            <div class="stat-valor" id="stat-media">0</div>
            <div class="stat-label">Média 🍃</div>
          </div>
          <div class="stat-box">
            <div class="stat-valor" id="stat-acertos">0%</div>
            <div class="stat-label">Acertos médios</div>
          </div>
        </div>
      </div>

    </div>

    <!-- COL DIREITA: Ranking completo -->
    <div class="card">
      <div class="card-titulo" style="justify-content:space-between;">
        <span>🌿 Ranking Completo</span>
        <span id="qtd-jogadores" style="font-size:0.9rem; color:#aaa; font-family:'Nunito'; font-weight:700;"></span>
      </div>
      <div class="rank-lista" id="rank-lista">
        <div class="rank-vazio">🌿 Aguardando jogadores...</div>
      </div>
      <div class="ultima-atualizacao" id="ultima-atualizacao"></div>
      <button class="btn-limpar" onclick="limparRanking()">🗑️ Limpar Ranking</button>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, orderBy, limit, onSnapshot, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB4IXXIbNHwvBDL1ZDNABVzejo7qvyBdpU",
  authDomain: "jogo-botanica.firebaseapp.com",
  projectId: "jogo-botanica",
  storageBucket: "jogo-botanica.firebasestorage.app",
  messagingSenderId: "280969438734",
  appId: "1:280969438734:web:0d98e44b5c105e2c803e5f"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

let rankingAnterior = [];
let primeiraVez = true;

// Folhas decorativas
const folhasBg = document.getElementById('folhas-bg');
['🍃','🌿','🌱','🍀','🌾'].forEach((f, i) => {
  const el = document.createElement('div');
  el.className = 'folha-bg';
  el.textContent = f;
  el.style.left = `${10 + i * 18}%`;
  el.style.animationDuration = `${15 + i * 4}s`;
  el.style.animationDelay = `${-i * 3}s`;
  folhasBg.appendChild(el);
});

// Listener em tempo real
const q = query(collection(db, 'ranking'), orderBy('pts','desc'), orderBy('ac','desc'), limit(50));

onSnapshot(q, (snap) => {
  const dados = snap.docs.map(d => ({ id: d.id, ...d.data() }));

  // Detecta novos jogadores para toast
  if (!primeiraVez && dados.length > rankingAnterior.length) {
    const novos = dados.filter(d => !rankingAnterior.find(r => r.id === d.id));
    novos.forEach(n => mostrarToast(`🎉 ${n.nome} terminou com ${n.pts} pontos!`));
  }

  rankingAnterior = dados;
  primeiraVez = false;

  renderizarPodio(dados);
  renderizarRanking(dados);
  renderizarStats(dados);
  atualizarStatus(true);
  document.getElementById('ultima-atualizacao').textContent =
    `Atualizado em ${new Date().toLocaleTimeString('pt-BR')}`;

}, (err) => {
  console.error(err);
  atualizarStatus(false);
});

function atualizarStatus(ok) {
  document.getElementById('status-dot').className = 'status-dot' + (ok ? '' : ' off');
  document.getElementById('status-txt').textContent = ok ? 'Ao vivo — atualizando em tempo real' : 'Sem conexão';
}

function renderizarPodio(dados) {
  const podio = document.getElementById('podio');
  podio.innerHTML = '';

  const ordemVisual = [1, 0, 2];
  const cls    = ['prata', 'ouro', 'bronze'];
  const medalha = ['🥈', '🥇', '🥉'];

  ordemVisual.forEach((ri, vi) => {
    const x   = dados[ri];
    const div = document.createElement('div');
    div.className = 'podio-item';

    if (x) {
      const inicial = x.nome.charAt(0).toUpperCase();
      div.innerHTML = `
        <div class="podio-avatar ${cls[vi]}">${inicial}</div>
        <div class="podio-nome">${x.nome}</div>
        <div class="podio-pts">${x.pts} 🍃</div>
        <div class="podio-base ${cls[vi]}">${medalha[vi]}</div>`;
    } else {
      div.innerHTML = `
        <div class="podio-avatar vazio">?</div>
        <div class="podio-nome" style="opacity:.3">—</div>
        <div class="podio-pts" style="opacity:.3">—</div>
        <div class="podio-base ${cls[vi]}" style="opacity:.2">${vi===1?'1':vi===0?'2':'3'}</div>`;
    }
    podio.appendChild(div);
  });
}

function renderizarRanking(dados) {
  const lista = document.getElementById('rank-lista');
  document.getElementById('qtd-jogadores').textContent =
    dados.length > 0 ? `${dados.length} jogador${dados.length > 1 ? 'es' : ''}` : '';

  if (dados.length === 0) {
    lista.innerHTML = '<div class="rank-vazio">🌿 Nenhum jogador ainda...<br>Escaneie o QR Code para começar!</div>';
    return;
  }

  lista.innerHTML = '';
  dados.forEach((x, i) => {
    const posClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
    const posLabel = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}`;
    const isNovo   = !rankingAnterior.find(r => r.id === x.id);
    const row = document.createElement('div');
    row.className = 'rank-row' + (isNovo ? ' novo' : '');
    row.innerHTML = `
      <span class="rank-pos ${posClass}">${posLabel}</span>
      <span class="rank-nome">${x.nome}</span>
      <span class="rank-acertos">${x.ac ?? 0} acertos</span>
      <span class="rank-pts">${x.pts} 🍃</span>`;
    lista.appendChild(row);
  });
}

function renderizarStats(dados) {
  if (dados.length === 0) {
    document.getElementById('stat-jogadores').textContent = '0';
    document.getElementById('stat-recorde').textContent   = '0';
    document.getElementById('stat-media').textContent     = '0';
    document.getElementById('stat-acertos').textContent   = '0%';
    return;
  }
  const totalPts = dados.reduce((s, d) => s + (d.pts || 0), 0);
  const totalAc  = dados.reduce((s, d) => s + (d.ac  || 0), 0);
  const media    = Math.round(totalPts / dados.length);
  const pctAc    = Math.round((totalAc / (dados.length * 8)) * 100);

  document.getElementById('stat-jogadores').textContent = dados.length;
  document.getElementById('stat-recorde').textContent   = dados[0].pts;
  document.getElementById('stat-media').textContent     = media;
  document.getElementById('stat-acertos').textContent   = `${pctAc}%`;
}

function mostrarToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

window.limparRanking = async function() {
  if (!confirm('Limpar todo o ranking da feira?')) return;
  const snap = await getDocs(collection(db, 'ranking'));
  for (const d of snap.docs) await deleteDoc(d.ref);
};
</script>
</body>
</html>
