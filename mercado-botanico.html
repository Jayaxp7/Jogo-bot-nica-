<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Feira Botânica</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap');

:root {
  --ceu:       #87CEEB;
  --ceu-baixo: #B8E4F7;
  --chao:      #C8A882;
  --chao2:     #B8956A;
  --toldo1:    #E63946;
  --toldo2:    #F4F1DE;
  --toldo3:    #2D6A4F;
  --madeira:   #8B5E3C;
  --madeira2:  #6B3F1E;
  --amarelo:   #FFD60A;
  --laranja:   #FF6B2B;
  --verde:     #2D6A4F;
  --verde-cl:  #52B788;
  --roxo:      #7B2D8B;
  --branco:    #FFFEF5;
  --texto:     #2C1810;
  --sombra:    rgba(0,0,0,0.15);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--ceu);
  min-height: 100vh;
  overflow-x: hidden;
  color: var(--texto);
}

.tela { display: none; min-height: 100vh; flex-direction: column; }
.tela.ativa { display: flex; }

/* ═══════════════════════════════
   TELA ENTRADA
═══════════════════════════════ */
#t-entrada {
  background: linear-gradient(180deg, var(--ceu) 0%, var(--ceu-baixo) 55%, var(--chao) 55%, var(--chao2) 100%);
  align-items: center;
  justify-content: flex-start;
  padding-top: 20px;
  overflow: hidden;
  position: relative;
}

/* Nuvens */
.nuvem {
  position: absolute;
  background: white;
  border-radius: 50px;
  opacity: 0.85;
}
.nuvem::before, .nuvem::after {
  content: '';
  position: absolute;
  background: white;
  border-radius: 50%;
}
.nuvem-1 { width: 80px; height: 28px; top: 30px; left: 10%; animation: flutua 6s ease-in-out infinite; }
.nuvem-1::before { width: 40px; height: 40px; top: -20px; left: 10px; }
.nuvem-1::after  { width: 28px; height: 28px; top: -12px; left: 35px; }
.nuvem-2 { width: 60px; height: 22px; top: 55px; right: 12%; animation: flutua 8s ease-in-out infinite 2s; }
.nuvem-2::before { width: 30px; height: 30px; top: -16px; left: 8px; }
.nuvem-2::after  { width: 22px; height: 22px; top: -10px; left: 30px; }

@keyframes flutua { 0%,100% { transform: translateX(0); } 50% { transform: translateX(8px); } }

/* Sol */
.sol {
  position: absolute;
  top: 18px; right: 18px;
  width: 48px; height: 48px;
  background: var(--amarelo);
  border-radius: 50%;
  box-shadow: 0 0 0 6px rgba(255,214,10,0.3), 0 0 0 12px rgba(255,214,10,0.15);
  animation: brilha 3s ease-in-out infinite;
}
@keyframes brilha { 0%,100% { box-shadow: 0 0 0 6px rgba(255,214,10,0.3), 0 0 0 12px rgba(255,214,10,0.15); } 50% { box-shadow: 0 0 0 10px rgba(255,214,10,0.35), 0 0 0 20px rgba(255,214,10,0.15); } }

/* Barraca */
.barraca-entrada {
  width: 100%;
  max-width: 400px;
  position: relative;
  margin-top: 10px;
}

/* Toldo listrado */
.toldo {
  width: 100%;
  height: 56px;
  position: relative;
  overflow: hidden;
  border-radius: 8px 8px 0 0;
  box-shadow: 0 4px 12px var(--sombra);
}
.toldo-listras {
  display: flex;
  height: 100%;
}
.toldo-listra {
  flex: 1;
  height: 100%;
}
.toldo-listra:nth-child(odd)  { background: var(--toldo1); }
.toldo-listra:nth-child(even) { background: var(--toldo2); }

.toldo-franja {
  display: flex;
  width: 100%;
}
.franja-item {
  flex: 1;
  height: 18px;
  clip-path: polygon(0 0, 100% 0, 50% 100%);
}
.franja-item:nth-child(odd)  { background: var(--toldo1); }
.franja-item:nth-child(even) { background: var(--toldo2); }

/* Placa da barraca */
.placa-barraca {
  background: var(--madeira);
  border: 3px solid var(--madeira2);
  border-radius: 10px;
  text-align: center;
  padding: 10px 16px;
  margin: 0 16px;
  box-shadow: 0 4px 0 var(--madeira2), 0 6px 12px var(--sombra);
  position: relative;
}
.placa-barraca::before, .placa-barraca::after {
  content: '🔩';
  position: absolute;
  top: 6px;
  font-size: 14px;
}
.placa-barraca::before { left: 8px; }
.placa-barraca::after  { right: 8px; }

.placa-titulo {
  font-family: 'Fredoka One', cursive;
  font-size: 28px;
  color: var(--amarelo);
  text-shadow: 2px 2px 0 var(--madeira2);
  line-height: 1.1;
}
.placa-sub {
  font-size: 12px;
  color: rgba(255,255,255,0.8);
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* Bancada */
.bancada-entrada {
  background: var(--madeira);
  border: 3px solid var(--madeira2);
  border-top: none;
  border-radius: 0 0 12px 12px;
  padding: 16px;
  margin: 0 16px;
  box-shadow: 0 6px 0 var(--madeira2), 0 8px 16px var(--sombra);
}

/* Feirante */
.feirante-wrap {
  text-align: center;
  margin-bottom: 12px;
}
.feirante { width: 130px; height: auto; image-rendering: pixelated; display: block; margin: 0 auto 8px; }
@keyframes balancar { 0%,100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }

.feirante-fala {
  background: var(--branco);
  border: 2px solid var(--amarelo);
  border-radius: 16px;
  padding: 10px 14px;
  font-size: 14px;
  font-weight: 800;
  color: var(--texto);
  position: relative;
  margin: 0 8px;
  line-height: 1.4;
}
.feirante-fala::before {
  content: '';
  position: absolute;
  top: -10px; left: 50%; transform: translateX(-50%);
  border: 5px solid transparent;
  border-bottom-color: var(--amarelo);
}

/* Campo nome */
.campo-nome-wrap { margin: 12px 0 10px; }
.campo-nome-label {
  font-size: 12px;
  font-weight: 800;
  color: var(--branco);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 5px;
  display: block;
}
.campo-nome {
  width: 100%;
  background: var(--branco);
  border: 3px solid var(--madeira2);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 16px;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  color: var(--texto);
  outline: none;
}
.campo-nome:focus { border-color: var(--amarelo); }
.campo-nome::placeholder { color: #bbb; }

.btn-jogar {
  width: 100%;
  background: var(--amarelo);
  border: none;
  border-radius: 12px;
  padding: 14px;
  font-size: 18px;
  font-family: 'Fredoka One', cursive;
  color: var(--texto);
  cursor: pointer;
  box-shadow: 0 5px 0 #C9A500, 0 7px 12px var(--sombra);
  transition: transform 0.1s, box-shadow 0.1s;
  letter-spacing: 0.5px;
  margin-top: 4px;
}
.btn-jogar:active { transform: translateY(3px); box-shadow: 0 2px 0 #C9A500; }

.btn-ranking-link {
  width: 100%;
  background: rgba(255,255,255,0.15);
  border: 2px solid rgba(255,255,255,0.4);
  border-radius: 10px;
  padding: 10px;
  font-size: 14px;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  color: var(--branco);
  cursor: pointer;
  margin-top: 8px;
}

.recorde-strip {
  background: var(--laranja);
  text-align: center;
  padding: 6px;
  font-size: 13px;
  font-weight: 800;
  color: var(--branco);
  width: 100%;
  position: absolute;
  bottom: 0;
}
.recorde-strip span { color: var(--amarelo); }

/* ═══════════════════════════════
   TELA JOGO
═══════════════════════════════ */
#t-jogo {
  background: linear-gradient(180deg, var(--ceu) 0%, var(--ceu-baixo) 40%, var(--chao) 40%, var(--chao2) 100%);
  min-height: 100vh;
}

/* HUD topo */
.hud {
  background: var(--verde);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 4px solid var(--madeira2);
  position: sticky;
  top: 0;
  z-index: 30;
}

.hud-nome-tag {
  background: var(--amarelo);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 13px;
  font-weight: 900;
  color: var(--texto);
  max-width: 110px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.hud-moedas {
  background: var(--madeira);
  border-radius: 20px;
  padding: 6px 12px;
  font-family: 'Fredoka One', cursive;
  font-size: 18px;
  color: var(--amarelo);
  display: flex;
  align-items: center;
  gap: 4px;
  border: 2px solid var(--madeira2);
}

.hud-timer {
  position: relative;
  width: 72px; height: 72px;
  margin-right: 8px;
  flex-shrink: 0;
}
.hud-timer svg { position: absolute; top:0; left:0; transform: rotate(-90deg); }
.timer-bg { fill: none; stroke: rgba(255,255,255,0.2); stroke-width: 5; }
.timer-fg { fill: none; stroke: var(--amarelo); stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke 0.5s; }
.timer-num {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Fredoka One', cursive;
  font-size: 22px; color: white; font-weight: bold;
}

/* Progresso */
.prog-wrap {
  display: flex;
  gap: 4px;
  padding: 8px 14px 4px;
}
.prog-dot {
  flex: 1; height: 8px;
  border-radius: 4px;
  background: rgba(255,255,255,0.3);
  transition: background 0.3s;
}
.prog-dot.feito { background: var(--verde-cl); }
.prog-dot.atual { background: var(--amarelo); animation: pisca 0.8s ease-in-out infinite; }
@keyframes pisca { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* Barraca do jogo */
.barraca-jogo {
  margin: 8px 12px 0;
  position: relative;
}

.toldo-jogo {
  height: 44px;
  border-radius: 10px 10px 0 0;
  overflow: hidden;
  position: relative;
}
.toldo-jogo .toldo-listras { display: flex; height: 100%; }
.toldo-jogo .toldo-listra:nth-child(odd)  { background: var(--toldo3); flex:1; }
.toldo-jogo .toldo-listra:nth-child(even) { background: var(--toldo2); flex:1; }

.toldo-jogo-franja { display: flex; }
.toldo-jogo-franja .franja-item { height: 14px; clip-path: polygon(0 0, 100% 0, 50% 100%); flex:1; }
.toldo-jogo-franja .franja-item:nth-child(odd)  { background: var(--toldo3); }
.toldo-jogo-franja .franja-item:nth-child(even) { background: var(--toldo2); }

.bancada-jogo {
  background: var(--madeira);
  border: 3px solid var(--madeira2);
  border-top: none;
  border-radius: 0 0 12px 12px;
  padding: 12px;
  box-shadow: 0 6px 0 var(--madeira2), 0 8px 16px var(--sombra);
}

/* ── Foto do produto ── */
.produto-foto-wrap-grande {
  width: 100%;
  height: 200px;
  border-radius: 14px;
  overflow: hidden;
  border: 3px solid var(--madeira2);
  background: #2a1f14;
  box-shadow: 0 3px 8px var(--sombra);
  position: relative;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.produto-foto {
  width: 100%; height: 100%;
  object-fit: contain;
  display: block;
}
.produto-foto-fallback {
  width: 100%; height: 100%;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 56px;
  background: #f5ede0;
}

/* Badge sobre a imagem */
.produto-badge {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(0deg, rgba(0,0,0,0.55) 0%, transparent 100%);
  padding: 12px 12px 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.produto-badge-num {
  font-size: 10px;
  font-weight: 900;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.produto-badge-nome {
  font-family: 'Fredoka One', cursive;
  font-size: 22px;
  color: #fff;
  flex: 1;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
}
.produto-badge-valor {
  background: var(--verde);
  color: #fff;
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 13px;
  font-weight: 900;
  white-space: nowrap;
}

/* ── Feirante + balão ── */
.feirante-pergunta-row {
  display: flex;
  align-items: flex-end;
  gap: 6px;
}
.feirante-reativo-emoji {
  width: 90px;
  height: auto;
  image-rendering: pixelated;
  flex-shrink: 0;
}
.balao-pergunta {
  flex: 1;
  position: relative;
}
/* Rabinho do balão apontando para o feirante (esquerda) */
.balao-pergunta::before {
  content: '';
  position: absolute;
  left: -12px;
  bottom: 18px;
  border: 7px solid transparent;
  border-right-color: var(--madeira2);
}
.balao-pergunta::after {
  content: '';
  position: absolute;
  left: -9px;
  bottom: 19px;
  border: 6px solid transparent;
  border-right-color: #fffef5;
}
.balao-fala {
  background: #fffef5;
  border: 3px solid var(--madeira2);
  border-radius: 16px 16px 16px 4px;
  padding: 12px 14px;
  font-family: 'Nunito', sans-serif;
  font-size: 16px;
  font-weight: 800;
  color: var(--texto);
  line-height: 1.4;
  box-shadow: 0 3px 10px var(--sombra);
}
.balao-fala strong {
  color: var(--laranja);
}

/* Remover pergunta-banner separado */
.pergunta-banner { display: none; }

/* Opções - caixas de feira */
.opcoes-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 0 12px 20px;
}

.opcao-btn {
  background: var(--branco);
  border: 3px solid #DDD;
  border-radius: 14px;
  padding: 10px 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.1s, box-shadow 0.1s;
  box-shadow: 0 4px 0 #CCC, 0 6px 8px var(--sombra);
  font-family: 'Nunito', sans-serif;
}
.opcao-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #CCC; }
.opcao-btn.hover-state { border-color: var(--laranja); }

.opcao-emoji { font-size: 30px; }
.opcao-nome {
  font-size: 13px;
  font-weight: 900;
  color: var(--texto);
  text-align: center;
  line-height: 1.2;
}

.opcao-btn.certo {
  border-color: var(--verde-cl);
  background: #F0FFF4;
  box-shadow: 0 4px 0 var(--verde), 0 6px 8px var(--sombra);
  pointer-events: none;
}
.opcao-btn.errado {
  border-color: #E63946;
  background: #FFF5F5;
  box-shadow: 0 4px 0 #B02A33;
  pointer-events: none;
}
.opcao-btn.bloqueado { pointer-events: none; opacity: 0.5; }

/* ═══════════════════════════════
   FLASH / POPUP REAÇÃO
═══════════════════════════════ */
.flash-overlay {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  pointer-events: none;
  opacity: 0;
  z-index: 100;
  transition: opacity 0.15s;
}
.flash-overlay.show { opacity: 1; }

.flash-balao {
  background: var(--branco);
  border-radius: 24px;
  padding: 20px 32px;
  text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  border: 4px solid var(--amarelo);
  transform: scale(0.8);
  transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
.flash-overlay.show .flash-balao { transform: scale(1); }
.flash-balao.verde-b { border-color: var(--verde-cl); }
.flash-balao.vermelho-b { border-color: #E63946; }

.flash-emoji { font-size: 52px; display: block; margin-bottom: 4px; }
.flash-msg { font-family: 'Fredoka One', cursive; font-size: 26px; color: var(--texto); }
.flash-sub { font-size: 14px; font-weight: 800; color: #666; margin-top: 4px; }

/* Confetes */
.confete {
  position: fixed;
  width: 10px; height: 10px;
  border-radius: 2px;
  pointer-events: none;
  z-index: 99;
  animation: cai 1s ease-in forwards;
}
@keyframes cai {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* ═══════════════════════════════
   TELA RESULTADO
═══════════════════════════════ */
#t-resultado {
  background: linear-gradient(180deg, var(--ceu) 0%, var(--ceu-baixo) 45%, var(--chao) 45%, var(--chao2) 100%);
  align-items: center;
  padding: 0 16px 40px;
  overflow-y: auto;
}

.resultado-barraca {
  width: 100%;
  max-width: 380px;
  margin-top: 16px;
}

.resultado-toldo {
  height: 44px;
  border-radius: 10px 10px 0 0;
  overflow: hidden;
}
.resultado-toldo .toldo-listras { display: flex; height: 100%; }
.resultado-toldo .toldo-listra:nth-child(odd)  { background: var(--roxo); flex:1; }
.resultado-toldo .toldo-listra:nth-child(even) { background: var(--toldo2); flex:1; }
.resultado-toldo-franja { display: flex; }
.resultado-toldo-franja .franja-item { height: 14px; clip-path: polygon(0 0, 100% 0, 50% 100%); flex:1; }
.resultado-toldo-franja .franja-item:nth-child(odd)  { background: var(--roxo); }
.resultado-toldo-franja .franja-item:nth-child(even) { background: var(--toldo2); }

.resultado-bancada {
  background: var(--madeira);
  border: 3px solid var(--madeira2);
  border-top: none;
  border-radius: 0 0 16px 16px;
  padding: 20px 16px;
  box-shadow: 0 6px 0 var(--madeira2), 0 8px 20px var(--sombra);
  text-align: center;
}

.resultado-feirante { width: 130px; height: auto; image-rendering: pixelated; margin-bottom: 8px; display: block; margin-left: auto; margin-right: auto; }
.resultado-titulo {
  font-family: 'Fredoka One', cursive;
  font-size: 28px;
  color: var(--amarelo);
  text-shadow: 1px 2px 0 var(--madeira2);
  margin-bottom: 4px;
}
.resultado-nome { font-size: 14px; color: rgba(255,255,255,0.7); font-weight: 700; margin-bottom: 14px; }
.resultado-pts-big {
  font-family: 'Fredoka One', cursive;
  font-size: 52px;
  color: var(--amarelo);
  line-height: 1;
}
.resultado-pts-label { font-size: 12px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }

.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 16px;
}
.stat-caixa {
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 10px;
  border: 2px solid rgba(255,255,255,0.15);
}
.stat-n { font-family: 'Fredoka One', cursive; font-size: 26px; }
.stat-l { font-size: 11px; color: rgba(255,255,255,0.6); font-weight: 700; }

/* Mini ranking resultado */
.mini-ranking-titulo {
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  margin-bottom: 8px;
  text-align: left;
}
.mini-ranking-lista { margin-bottom: 16px; display: flex; flex-direction: column; gap: 5px; }
.mini-rank-item {
  background: rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 9px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  border: 2px solid transparent;
}
.mini-rank-item.eu { border-color: var(--amarelo); background: rgba(255,214,10,0.12); }
.mini-rank-pos { font-family: 'Fredoka One', cursive; font-size: 16px; min-width: 26px; text-align: center; }
.mini-rank-nome { flex:1; font-size: 13px; font-weight: 800; color: var(--branco); }
.mini-rank-pts { font-family: 'Fredoka One', cursive; font-size: 15px; color: var(--amarelo); }

.btn-jogar-novo {
  width: 100%;
  background: var(--amarelo);
  border: none;
  border-radius: 12px;
  padding: 14px;
  font-size: 18px;
  font-family: 'Fredoka One', cursive;
  color: var(--texto);
  cursor: pointer;
  box-shadow: 0 5px 0 #C9A500;
  margin-bottom: 8px;
  transition: transform 0.1s, box-shadow 0.1s;
}
.btn-jogar-novo:active { transform: translateY(3px); box-shadow: 0 2px 0 #C9A500; }

.btn-ver-rank {
  width: 100%;
  background: rgba(255,255,255,0.12);
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 12px;
  padding: 12px;
  font-size: 14px;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  color: rgba(255,255,255,0.8);
  cursor: pointer;
}

/* ═══════════════════════════════
   TELA RANKING
═══════════════════════════════ */
#t-ranking {
  background: linear-gradient(180deg, var(--ceu) 0%, var(--ceu-baixo) 50%, var(--chao) 50%, var(--chao2) 100%);
  align-items: center;
  padding: 20px 16px 40px;
  overflow-y: auto;
}

.ranking-barraca {
  width: 100%;
  max-width: 380px;
}

.ranking-toldo {
  height: 44px; border-radius: 10px 10px 0 0; overflow: hidden;
}
.ranking-toldo .toldo-listras { display: flex; height: 100%; }
.ranking-toldo .toldo-listra:nth-child(odd)  { background: var(--toldo1); flex:1; }
.ranking-toldo .toldo-listra:nth-child(even) { background: var(--amarelo); flex:1; }
.ranking-toldo-franja { display: flex; }
.ranking-toldo-franja .franja-item { height: 14px; clip-path: polygon(0 0, 100% 0, 50% 100%); flex:1; }
.ranking-toldo-franja .franja-item:nth-child(odd)  { background: var(--toldo1); }
.ranking-toldo-franja .franja-item:nth-child(even) { background: var(--amarelo); }

.ranking-bancada {
  background: var(--madeira);
  border: 3px solid var(--madeira2);
  border-top: none;
  border-radius: 0 0 16px 16px;
  padding: 16px;
  box-shadow: 0 6px 0 var(--madeira2), 0 8px 20px var(--sombra);
}

.ranking-header-txt {
  text-align: center;
  margin-bottom: 16px;
}
.ranking-header-emoji { font-size: 36px; }
.ranking-header-titulo {
  font-family: 'Fredoka One', cursive;
  font-size: 24px;
  color: var(--amarelo);
  text-shadow: 1px 2px 0 var(--madeira2);
}
.ranking-header-sub { font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }

/* Pódio */
.podio {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 6px;
  margin-bottom: 16px;
}
.podio-item { display: flex; flex-direction: column; align-items: center; flex:1; }
.podio-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Fredoka One', cursive;
  font-size: 18px;
  margin-bottom: 4px;
  border: 3px solid;
}
.podio-avatar.ouro   { background: rgba(255,215,0,0.2);   color: #FFD700; border-color: #FFD700; }
.podio-avatar.prata  { background: rgba(192,192,192,0.2); color: #C0C0C0; border-color: #C0C0C0; }
.podio-avatar.bronze { background: rgba(205,127,50,0.2);  color: #CD7F32; border-color: #CD7F32; }

.podio-nome { font-size: 10px; font-weight: 900; color: var(--branco); margin-bottom: 3px; text-align: center; max-width: 70px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.podio-pts  { font-family: 'Fredoka One', cursive; font-size: 12px; color: var(--amarelo); margin-bottom: 4px; }
.podio-base {
  width: 100%; border-radius: 6px 6px 0 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Fredoka One', cursive; font-size: 18px; border: 2px solid;
}
.podio-base.ouro   { height: 56px; background: rgba(255,215,0,0.15);   border-color: rgba(255,215,0,0.4);   color: #FFD700; }
.podio-base.prata  { height: 40px; background: rgba(192,192,192,0.1);  border-color: rgba(192,192,192,0.3); color: #C0C0C0; }
.podio-base.bronze { height: 28px; background: rgba(205,127,50,0.1);   border-color: rgba(205,127,50,0.3);  color: #CD7F32; }

.ranking-lista-completa { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
.rank-row {
  display: flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.07);
  border-radius: 10px; padding: 9px 12px;
  border: 2px solid transparent;
}
.rank-row.eu { border-color: var(--amarelo); background: rgba(255,214,10,0.1); }
.rank-pos { font-family: 'Fredoka One', cursive; font-size: 14px; color: rgba(255,255,255,0.5); min-width: 22px; text-align: right; }
.rank-nome { flex:1; font-size: 13px; font-weight: 800; color: var(--branco); }
.rank-acertos { font-size: 11px; color: rgba(255,255,255,0.4); }
.rank-pts { font-family: 'Fredoka One', cursive; font-size: 14px; color: var(--amarelo); }

.ranking-vazio { text-align: center; color: rgba(255,255,255,0.4); font-size: 14px; padding: 20px; font-weight: 700; }

.btn-voltar-ranking {
  width: 100%;
  background: var(--amarelo);
  border: none;
  border-radius: 12px;
  padding: 13px;
  font-size: 16px;
  font-family: 'Fredoka One', cursive;
  color: var(--texto);
  cursor: pointer;
  box-shadow: 0 4px 0 #C9A500;
  margin-bottom: 8px;
}
.btn-limpar-rank {
  width: 100%;
  background: none;
  border: 2px solid rgba(255,61,61,0.3);
  border-radius: 10px;
  padding: 10px;
  font-size: 12px;
  color: rgba(255,100,100,0.6);
  cursor: pointer;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
}

.feirante { width: 130px; height: auto; image-rendering: pixelated; display: block; margin: 0 auto 8px; }
.feirante-reativo { display: flex; align-items: flex-end; gap: 10px; margin: -10px 0 6px; }
.feirante-reativo-emoji { width: 140px; height: auto; image-rendering: pixelated; flex-shrink: 0; margin-bottom: -4px; }
.resultado-feirante { width: 130px; height: auto; image-rendering: pixelated; margin-bottom: 8px; display: block; margin-left: auto; margin-right: auto; }

.trofeu-img { width: 100px; height: auto; display: block; margin: 0 auto 10px; filter: drop-shadow(0 4px 12px rgba(255,200,0,0.5)); animation: flutuaTrofeu 2s ease-in-out infinite; }
@keyframes flutuaTrofeu { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.ranking-header-emoji img { width: 80px; height: auto; filter: drop-shadow(0 4px 12px rgba(255,200,0,0.4)); }

@keyframes pulseTimer {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}
.timer-urgente {
  animation: pulseTimer 0.5s ease-in-out infinite;
  transform-origin: center;
}

/* ═══ BOTÃO DUELO ═══ */
.btn-duelo {
  background: linear-gradient(135deg, #E63946, #c1121f);
  color: white;
  border: none;
  border-radius: 16px;
  padding: 14px 24px;
  font-family: 'Fredoka One', cursive;
  font-size: 1.1rem;
  cursor: pointer;
  width: 100%;
  margin-top: 8px;
  letter-spacing: 1px;
  box-shadow: 0 4px 0 #7d0000;
  transition: all 0.15s;
}
.btn-duelo:active { transform: translateY(3px); box-shadow: 0 1px 0 #7d0000; }

/* ═══ TELA DUELO LOBBY ═══ */
#t-duelo-lobby {
  /* display controlado por .tela.ativa */
  background: linear-gradient(180deg, #1a0a2e 0%, #16213e 60%, #0f3460 100%);
  flex-direction: column; align-items: center;
  justify-content: center; padding: 20px; min-height: 100vh;
}
.duelo-titulo {
  font-family: 'Fredoka One', cursive;
  font-size: 2rem;
  color: #FFD60A;
  text-align: center;
  margin-bottom: 6px;
  text-shadow: 0 2px 10px rgba(255,214,10,0.4);
}
.duelo-sub {
  color: #aaa; font-size: 0.9rem; text-align: center; margin-bottom: 24px;
}
.duelo-card {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 24px;
  width: 100%; max-width: 340px;
  display: flex; flex-direction: column; gap: 12px;
}
.duelo-or {
  text-align: center; color: #666; font-weight: 800;
  font-size: 0.85rem; position: relative;
}
.duelo-or::before, .duelo-or::after {
  content: ''; position: absolute; top: 50%; width: 40%;
  height: 1px; background: rgba(255,255,255,0.1);
}
.duelo-or::before { left: 0; }
.duelo-or::after { right: 0; }
.duelo-input {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 12px;
  padding: 12px 16px;
  color: white;
  font-family: 'Nunito', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  text-align: center;
  letter-spacing: 3px;
  text-transform: uppercase;
  outline: none;
}
.duelo-input::placeholder { color: #555; letter-spacing: 1px; text-transform: none; }
.btn-criar-sala {
  background: linear-gradient(135deg, #52B788, #2D6A4F);
  color: white; border: none; border-radius: 14px;
  padding: 14px; font-family: 'Fredoka One', cursive;
  font-size: 1.1rem; cursor: pointer; width: 100%;
  box-shadow: 0 4px 0 #1a3a2a;
  transition: all 0.15s;
}
.btn-criar-sala:active { transform: translateY(3px); box-shadow: 0 1px 0 #1a3a2a; }
.btn-entrar-sala {
  background: linear-gradient(135deg, #E63946, #c1121f);
  color: white; border: none; border-radius: 14px;
  padding: 14px; font-family: 'Fredoka One', cursive;
  font-size: 1.1rem; cursor: pointer; width: 100%;
  box-shadow: 0 4px 0 #7d0000;
  transition: all 0.15s;
}
.btn-entrar-sala:active { transform: translateY(3px); box-shadow: 0 1px 0 #7d0000; }
.btn-voltar-lobby {
  background: transparent; border: 1px solid rgba(255,255,255,0.2);
  color: #aaa; border-radius: 12px; padding: 10px 20px;
  font-family: 'Nunito', sans-serif; font-weight: 700;
  cursor: pointer; margin-top: 12px; font-size: 0.9rem;
}

/* ═══ TELA DUELO ESPERA ═══ */
#t-duelo-espera {
  /* display controlado por .tela.ativa */
  background: linear-gradient(180deg, #1a0a2e 0%, #16213e 100%);
  flex-direction: column; align-items: center;
  justify-content: center; padding: 20px; min-height: 100vh; gap: 20px;
}
.sala-codigo {
  font-family: 'Fredoka One', cursive;
  font-size: 3rem;
  color: #FFD60A;
  letter-spacing: 6px;
  text-shadow: 0 0 20px rgba(255,214,10,0.5);
}
.sala-label {
  color: #aaa; font-size: 0.85rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px;
}
.espera-status {
  color: white; font-size: 1rem; font-weight: 700;
  text-align: center; line-height: 1.6;
}
.espera-dot {
  display: inline-block;
  animation: dotPulse 1.4s infinite;
}
.espera-dot:nth-child(2) { animation-delay: 0.2s; }
.espera-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse {
  0%,80%,100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1.2); }
}
.jogador-slot {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 16px 24px;
  text-align: center;
  width: 100%; max-width: 300px;
}
.jogador-slot.conectado { border-color: #52B788; background: rgba(82,183,136,0.1); }
.jogador-slot-nome { font-family: 'Fredoka One', cursive; font-size: 1.2rem; }
.jogador-slot-status { font-size: 0.8rem; color: #aaa; margin-top: 4px; }

/* ═══ TELA DUELO JOGO ═══ */
#t-duelo-jogo {
  /* display controlado por .tela.ativa */
  background: var(--ceu);
  flex-direction: column;
  min-height: 100vh;
}
.duelo-hud {
  background: #1a0a2e;
  padding: 10px 14px;
  border-bottom: 3px solid #E63946;
  position: sticky; top: 0; z-index: 30;
}
.duelo-placar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 8px;
}
.duelo-player-nome {
  font-family: 'Fredoka One', cursive;
  font-size: 0.9rem;
  color: white;
  max-width: 100px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.duelo-player-pts {
  font-family: 'Fredoka One', cursive;
  font-size: 1.1rem;
  color: #FFD60A;
}
.duelo-vs { color: #E63946; font-family: 'Fredoka One', cursive; font-size: 1rem; }

/* Barra cabo de guerra */
.cabo-guerra-wrap {
  position: relative;
  height: 28px;
  background: rgba(255,255,255,0.1);
  border-radius: 14px;
  overflow: hidden;
  border: 2px solid rgba(255,255,255,0.15);
}
.cabo-guerra-p1 {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: linear-gradient(90deg, #52B788, #2D6A4F);
  transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  border-radius: 12px 0 0 12px;
}
.cabo-guerra-p2 {
  position: absolute; right: 0; top: 0; bottom: 0;
  background: linear-gradient(90deg, #c1121f, #E63946);
  transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  border-radius: 0 12px 12px 0;
}
.cabo-guerra-meio {
  position: absolute; left: 50%; top: -2px; bottom: -2px;
  width: 4px; background: white; transform: translateX(-50%);
  z-index: 2; border-radius: 2px;
}
.cabo-guerra-nó {
  position: absolute; top: 50%; transform: translate(-50%, -50%);
  width: 22px; height: 22px; background: white;
  border-radius: 50%; z-index: 3;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  transition: left 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
}
.acertos-counter {
  text-align: center;
  font-size: 0.75rem;
  color: #aaa;
  font-weight: 700;
  margin-top: 4px;
}

/* ═══ TELA DUELO RESULTADO ═══ */
#t-duelo-resultado {
  /* display controlado por .tela.ativa */
  background: linear-gradient(180deg, #1a0a2e 0%, #16213e 100%);
  flex-direction: column; align-items: center;
  justify-content: center; padding: 24px; min-height: 100vh; gap: 16px;
  text-align: center;
}
.duelo-resultado-titulo {
  font-family: 'Fredoka One', cursive;
  font-size: 2.2rem;
  color: #FFD60A;
}
.duelo-resultado-vencedor {
  font-family: 'Fredoka One', cursive;
  font-size: 1.6rem;
  color: white;
}
.duelo-resultado-placar {
  display: flex; gap: 20px; align-items: center;
}
.duelo-resultado-player {
  background: rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 16px 20px;
  min-width: 100px;
}
.duelo-resultado-player.venceu {
  border: 2px solid #FFD60A;
  background: rgba(255,214,10,0.1);
}
.duelo-resultado-player-nome {
  font-size: 0.85rem; color: #aaa; font-weight: 700;
}
.duelo-resultado-player-pts {
  font-family: 'Fredoka One', cursive;
  font-size: 2rem; color: #FFD60A;
}
.btn-duelo-novamente {
  background: linear-gradient(135deg, #E63946, #c1121f);
  color: white; border: none; border-radius: 14px;
  padding: 14px 28px; font-family: 'Fredoka One', cursive;
  font-size: 1.1rem; cursor: pointer; margin-top: 8px;
  box-shadow: 0 4px 0 #7d0000;
}

#t-duelo-lobby.ativa, #t-duelo-espera.ativa, #t-duelo-resultado.ativa {
  align-items: center;
  justify-content: center;
}
